<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Courses – SIS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <span class="brand">SIS – Student Portal</span>
  <div class="nav-links">
    <a href="/student/dashboard.html">Dashboard</a>
    <a href="/student/courses.html">Courses</a>
    <a href="/student/schedule.html">My Schedule</a>
    <a href="/student/history.html">Academic History</a>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn btn-sm" onclick="logout()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3)">Sign Out</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">Course Catalog</div>
  <div id="alert-box"></div>

  <div class="card" style="padding:16px 24px">
    <input type="text" id="search" placeholder="Search by code, title, or professor..." style="width:100%;max-width:400px" oninput="filterCourses()">
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th><th>Title</th><th>Units</th><th>Professor</th>
            <th>Room</th><th>Schedule</th><th>Semester</th><th>Seats</th><th></th>
          </tr>
        </thead>
        <tbody id="courses-body">
          <tr><td colspan="9" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
let allCourses = [];

(async () => {
  const user = await checkAuth('student');
  document.getElementById('nav-user').textContent = `${user.firstName} ${user.lastName}`;

  allCourses = await apiFetch('/api/courses/');
  renderCourses(allCourses);
})();

function filterCourses() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allCourses.filter(r =>
    (r.course_code || '').toLowerCase().includes(q) ||
    (r.title || '').toLowerCase().includes(q) ||
    (`${r.prof_first} ${r.prof_last}`).toLowerCase().includes(q)
  );
  renderCourses(filtered);
}

function renderCourses(courses) {
  const tbody = document.getElementById('courses-body');
  if (courses.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty">No courses found.</td></tr>`;
    return;
  }
  tbody.innerHTML = courses.map(r => {
    const available = r.available_seats ?? (r.max_seats - r.enrolled_count);
    const full = available <= 0;
    return `<tr>
      <td><strong>${r.course_code}</strong></td>
      <td>${r.title}</td>
      <td>${r.units}</td>
      <td>${r.prof_first ? r.prof_first + ' ' + r.prof_last : '—'}</td>
      <td>${r.room || '—'}</td>
      <td>${r.schedule || '—'}</td>
      <td>${r.semester || '—'}</td>
      <td>${seatsBadge(available, r.max_seats)}</td>
      <td>
        ${r.section_id
          ? `<button class="btn btn-success btn-sm" ${full ? 'disabled title="Section full"' : ''} onclick="enroll(${r.section_id})">Enroll</button>`
          : '<span style="color:#bbb;font-size:0.8rem">No section</span>'}
      </td>
    </tr>`;
  }).join('');
}

async function enroll(sectionId) {
  try {
    await apiFetch('/api/enrollment/enroll', { method: 'POST', body: { section_id: sectionId } });
    showAlert('alert-box', 'Enrolled successfully!', 'success');
    allCourses = await apiFetch('/api/courses/');
    filterCourses();
  } catch (err) {
    showAlert('alert-box', err.message);
  }
}
</script>
</body>
</html>
