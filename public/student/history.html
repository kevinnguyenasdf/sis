<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic History – SIS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <span class="brand">SIS – Student Portal</span>
  <div class="nav-links">
    <a href="/student/dashboard.html">Dashboard</a>
    <a href="/student/courses.html">Courses</a>
    <a href="/student/schedule.html">My Schedule</a>
    <a href="/student/history.html">Academic History</a>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn btn-sm" onclick="logout()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3)">Sign Out</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">Academic History</div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th><th>Course</th><th>Units</th>
            <th>Semester</th><th>Year</th><th>Grade</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr><td colspan="7" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
(async () => {
  const user = await checkAuth('student');
  document.getElementById('nav-user').textContent = `${user.firstName} ${user.lastName}`;

  const history = await apiFetch('/api/students/history');
  const tbody = document.getElementById('history-body');
  if (history.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">No academic history yet.</td></tr>`;
    return;
  }
  tbody.innerHTML = history.map(r => {
    const statusBadge = r.status === 'completed'
      ? '<span class="badge badge-green">Completed</span>'
      : r.status === 'dropped'
      ? '<span class="badge badge-red">Dropped</span>'
      : '<span class="badge badge-blue">Enrolled</span>';
    return `<tr>
      <td><strong>${r.course_code}</strong></td>
      <td>${r.title}</td>
      <td>${r.units}</td>
      <td>${r.semester}</td>
      <td>${r.year}</td>
      <td>${gradeBadge(r.grade)}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
})();
</script>
</body>
</html>
