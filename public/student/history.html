<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic History – SIS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <span class="brand">SIS – Student Portal</span>
  <div class="nav-links">
    <a href="/student/dashboard.html">Dashboard</a>
    <a href="/student/courses.html">Courses</a>
    <a href="/student/schedule.html">My Schedule</a>
    <a href="/student/history.html">Academic History</a>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn btn-sm" onclick="logout()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3)">Sign Out</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">Academic History</div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th><th>Course</th><th>Units</th>
            <th>Semester</th><th>Year</th><th>Grade</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr><td colspan="7" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card" id="degree-progress-card" style="display:none">
    <div class="card-title">Degree Progress</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Code</th><th>Course</th><th>Units</th><th>Status</th><th>Grade</th></tr>
        </thead>
        <tbody id="progress-body">
          <tr><td colspan="5" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div id="graduation-banner" style="display:none;margin-top:16px;padding:14px 18px;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;color:#1b5e20;font-weight:600">
      You have completed all required courses for your major and are eligible for graduation.
    </div>
    <div id="progress-summary" style="margin-top:12px;font-size:0.9rem;color:#555"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
(async () => {
  const user = await checkAuth('student');
  document.getElementById('nav-user').textContent = `${user.firstName} ${user.lastName}`;

  const [history, progress] = await Promise.all([
    apiFetch('/api/students/history'),
    apiFetch('/api/students/degree-progress'),
  ]);

  const tbody = document.getElementById('history-body');
  if (history.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">No academic history yet.</td></tr>`;
  } else {
    tbody.innerHTML = history.map(r => {
      const statusBadge = r.status === 'completed'
        ? '<span class="badge badge-green">Completed</span>'
        : r.status === 'dropped'
        ? '<span class="badge badge-red">Dropped</span>'
        : '<span class="badge badge-blue">Enrolled</span>';
      return `<tr>
        <td><strong>${r.course_code}</strong></td>
        <td>${r.title}</td>
        <td>${r.units}</td>
        <td>${r.semester}</td>
        <td>${r.year}</td>
        <td>${gradeBadge(r.grade)}</td>
        <td>${statusBadge}</td>
      </tr>`;
    }).join('');
  }

  if (progress.length > 0) {
    document.getElementById('degree-progress-card').style.display = '';
    const pbody = document.getElementById('progress-body');
    pbody.innerHTML = progress.map(r => `<tr>
      <td><strong>${r.course_code}</strong></td>
      <td>${r.title}</td>
      <td>${r.units}</td>
      <td>${r.completed ? '<span class="badge badge-green">Completed</span>' : '<span class="badge" style="background:#f5f5f5;color:#555">Pending</span>'}</td>
      <td>${r.completed ? gradeBadge(r.grade) : '—'}</td>
    </tr>`).join('');

    const completed = progress.filter(r => r.completed).length;
    const total = progress.length;
    const completedUnits = progress.filter(r => r.completed).reduce((sum, r) => sum + parseInt(r.units), 0);
    const totalUnits = progress.reduce((sum, r) => sum + parseInt(r.units), 0);
    document.getElementById('progress-summary').textContent =
      `${completed} of ${total} required courses completed (${completedUnits} of ${totalUnits} units)`;
    if (completed === total) {
      document.getElementById('graduation-banner').style.display = '';
    }
  }
})();
</script>
</body>
</html>
