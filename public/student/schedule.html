<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Schedule – SIS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <span class="brand">SIS – Student Portal</span>
  <div class="nav-links">
    <a href="/student/dashboard.html">Dashboard</a>
    <a href="/student/courses.html">Courses</a>
    <a href="/student/schedule.html">My Schedule</a>
    <a href="/student/history.html">Academic History</a>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn btn-sm" onclick="logout()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3)">Sign Out</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">My Schedule</div>
  <div id="alert-box"></div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th><th>Course</th><th>Units</th><th>Professor</th>
            <th>Room</th><th>Schedule</th><th>Semester</th><th>Drop Deadline</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="schedule-body">
          <tr><td colspan="10" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
let schedule = [];

(async () => {
  const user = await checkAuth('student');
  document.getElementById('nav-user').textContent = `${user.firstName} ${user.lastName}`;
  await loadSchedule();
})();

async function loadSchedule() {
  schedule = await apiFetch('/api/students/schedule');
  const tbody = document.getElementById('schedule-body');
  if (schedule.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="empty">No active enrollments. <a href="/student/courses.html">Browse courses</a></td></tr>`;
    return;
  }
  tbody.innerHTML = schedule.map(r => `
    <tr>
      <td><strong>${r.course_code}</strong></td>
      <td>${r.title}</td>
      <td>${r.units}</td>
      <td>${r.prof_first} ${r.prof_last}</td>
      <td>${r.room || '—'}</td>
      <td>${r.schedule || '—'}</td>
      <td>${r.semester}</td>
      <td>${r.drop_deadline ? new Date(r.drop_deadline).toLocaleDateString() : 'N/A'}</td>
      <td><span class="badge badge-green">Enrolled</span></td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="drop(${r.enrollment_id})">Drop</button>
      </td>
    </tr>`).join('');
}

async function drop(enrollmentId) {
  if (!confirm('Are you sure you want to drop this course?')) return;
  try {
    await apiFetch('/api/enrollment/drop', { method: 'POST', body: { enrollment_id: enrollmentId } });
    showAlert('alert-box', 'Course dropped successfully.', 'success');
    await loadSchedule();
  } catch (err) {
    showAlert('alert-box', err.message);
  }
}
</script>
</body>
</html>
